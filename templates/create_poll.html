<!DOCTYPE html>
<html>
<head>
    <title>Create a Custom Poll</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f0f2f5; text-align: center; }
        .box { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: #28a745; color: white; border: none; padding: 12px; cursor: pointer; font-size: 16px; border-radius: 5px; width: 95%; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📊 QuickPoll Generator</h2>
        <form action="/create" method="POST">
            <input type="text" name="question" placeholder="Enter your poll question here..." required>
            <hr>
            <input type="text" name="options" placeholder="Choice 1" required>
            <input type="text" name="options" placeholder="Choice 2" required>
            <input type="text" name="options" placeholder="Choice 3 (Optional)">
            <input type="text" name="options" placeholder="Choice 4 (Optional)">
            <br><br>
            <button type="submit" class="btn">Generate My Poll Links</button>
        </form>
    </div>
</body>
</html>
<input type="text" name="feedback_question" placeholder="Add a feedback question...">
