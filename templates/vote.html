<!DOCTYPE html>
<html>
<head>
    <title>Anonymous Live Poll</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .btn { background: #007BFF; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        textarea { width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; }
    </style>
</head>
<body>
    <div class="card">
        <h2>{{ question }}</h2>
        <form action="/poll/{{ poll_id }}/vote" method="POST">
            <p><label>Your Name/Voter Identifier:</label><br>
            <input type="text" name="student_name" required style="width: 95%; padding: 8px; margin-top: 5px;"></p>
            
            <p><label>Select your choice:</label></p>
            {% for option in options %}
                <p><input type="radio" name="choice" value="{{ option }}" required> {{ option }}</p>
            {% endfor %}
            
            <!-- DYNAMICALLY DISPLAY FEEDBACK SECTION IF ACTIVE -->
            {% if feedback_question %}
                <hr>
                <p><label><strong>Feedback Section:</strong> {{ feedback_question }}</label></p>
                <textarea name="feedback_answer" rows="3" placeholder="Type your answer here..."></br></textarea>
            {% endif %}
            <br><br>
            <button type="submit" class="btn">Submit Anonymous Vote</button>
        </form>
    </div>
</body>
</html>
