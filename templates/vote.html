<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Your Vote</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-md max-w-md w-full">
        <div id="countdown" class="text-center text-sm font-semibold bg-amber-50 text-amber-700 py-1.5 rounded-md mb-4 hidden"></div>
        
        {% if is_expired %}
        <div class="text-center text-red-600 font-bold text-lg py-6">❌ This poll has expired and is closed.</div>
        {% else %}
        <h2 class="text-xl font-bold text-gray-800 mb-4">{{ question }}</h2>
        <form action="/poll/{{ poll_id }}/vote" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Full Name</label>
                <input type="text" name="student_name" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Roll Number</label>
                <input type="text" name="roll_number" required placeholder="e.g., 25X1A05XX" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 uppercase">
            </div>
            <div class="space-y-2 pt-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Select an Option:</label>
                {% for option in options %}
                <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                    <input type="radio" name="choice" value="{{ option }}" required class="h-4 w-4 text-emerald-600 focus:ring-emerald-500">
                    <span class="text-gray-700 font-medium">{{ option }}</span>
                </label>
                {% endfor %}
            </div>
            {% if feedback_question %}
            <div class="pt-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ feedback_question }}</label>
                <textarea name="feedback_answer" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Your comments..."></textarea>
            </div>
            {% endif %}
            <button type="submit" class="w-full bg-emerald-600 text-white font-medium py-2.5 rounded-md hover:bg-emerald-700 transition cursor-pointer">Submit Response</button>
        </form>
        {% endif %}
    </div>

    <script>
        const expiryStr = "{{ expires_at }}";
        if (expiryStr) {
            const target = new Date(expiryStr + "Z").getTime();
            const box = document.getElementById('countdown');
            box.classList.remove('hidden');
            
            setInterval(() => {
                const now = new Date().getTime();
                const distance = target - now;
                if (distance < 0) {
                    box.innerText = "Poll Closed";
                    return;
                }
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                box.innerText = `⏳ Closes in: ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }
    </script>
</body>
</html>
